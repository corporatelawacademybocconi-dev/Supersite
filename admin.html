<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Academia Europa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --ink: #0e0e0d;
      --ink-2: #4a4a46;
      --ink-3: #9a9993;
      --paper: #f8f6f2;
      --surface: #f0ede7;
      --white: #fff;
      --accent: #1e3d6e;
      --accent-2: #c8913a;
      --rule: #dedad3;
      --danger: #9b2020;
      --danger-bg: #fdf0f0;
      --success: #1a5c3a;
      --success-bg: #f0fdf6;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--surface);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 2.75rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(14, 14, 13, 0.1);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.35rem;
    }

    .login-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2)
    }

    .login-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .login-sub {
      font-size: 0.825rem;
      color: var(--ink-3);
      margin-bottom: 2rem
    }

    .field {
      margin-bottom: 1.25rem
    }

    .field label {
      display: block;
      font-size: 0.775rem;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 0.65rem 0.875rem;
      border: 1px solid var(--rule);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent)
    }

    .field textarea {
      resize: vertical;
      line-height: 1.65
    }

    .field-hint {
      font-size: 0.74rem;
      color: var(--ink-3);
      margin-top: 0.3rem
    }

    .char-count {
      font-size: 0.72rem;
      color: var(--ink-3);
      text-align: right;
      margin-top: 0.25rem
    }

    .btn-full {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: background 0.15s;
    }

    .btn-full:hover {
      background: #162e54
    }

    .btn-full:disabled {
      opacity: 0.5;
      cursor: not-allowed
    }

    .msg {
      border-radius: 8px;
      padding: 0.65rem 0.875rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }

    .msg.error {
      background: var(--danger-bg);
      border: 1px solid #f5c5c5;
      color: var(--danger)
    }

    .msg.success {
      background: var(--success-bg);
      border: 1px solid #b3e5cc;
      color: var(--success)
    }

    #admin-app {
      display: none
    }

    .topbar {
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.75rem;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem
    }

    .topbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .topbar-badge {
      background: #e8edf5;
      color: var(--accent);
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem
    }

    .btn-sm {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.15s;
      border: 1px solid var(--rule);
      background: none;
      color: var(--ink-2);
      text-decoration: none;
    }

    .btn-sm:hover {
      border-color: var(--ink-3);
      color: var(--ink)
    }

    .btn-sm.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    .btn-sm.primary:hover {
      background: #162e54;
      border-color: #162e54
    }

    .btn-sm:disabled {
      opacity: 0.4;
      cursor: not-allowed
    }

    .app-layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      background: var(--paper);
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-top {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--rule)
    }

    .sidebar-search {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--rule);
      border-radius: 7px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }

    .sidebar-search:focus {
      border-color: var(--accent)
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-new:hover {
      background: #162e54
    }

    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding: 0.75rem 1rem 0.4rem;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.25rem 0.5rem 1rem
    }

    .ali {
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }

    .ali:hover {
      background: var(--surface)
    }

    .ali.active {
      background: #e8edf5;
      border-color: rgba(30, 61, 110, 0.15)
    }

    .ali-title {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
      margin-bottom: 0.15rem;
    }

    .ali-meta {
      font-size: 0.72rem;
      color: var(--ink-3)
    }

    .sidebar-count {
      padding: 0.5rem 1rem 1rem;
      font-size: 0.75rem;
      color: var(--ink-3);
      text-align: center;
    }

    .editor {
      padding: 2rem 2.5rem;
      overflow-y: auto;
      max-width: 820px
    }

    .empty-editor {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--ink-3);
      text-align: center;
      gap: 0.75rem;
    }

    .empty-icon {
      font-size: 3rem;
      opacity: 0.3
    }

    .editor-hdr {
      margin-bottom: 2rem
    }

    .editor-hdr h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
    }

    .editor-hdr p {
      font-size: 0.825rem;
      color: var(--ink-3)
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem
    }

    .divider {
      height: 1px;
      background: var(--rule);
      margin: 2rem 0
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem
    }

    .danger-section {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule)
    }

    .danger-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--danger);
      margin-bottom: 0.75rem
    }

    .btn-danger {
      background: none;
      border: 1px solid #f5c5c5;
      color: var(--danger);
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.15s;
    }

    .btn-danger:hover {
      background: var(--danger-bg)
    }

    .toast {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      background: var(--ink);
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 9px;
      font-size: 0.84rem;
      font-weight: 500;
      z-index: 9999;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.25s;
      max-width: 340px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    .toast.ok {
      background: #1a5c3a
    }

    .toast.err {
      background: var(--danger)
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 2rem auto;
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-dot"></span>
        <span class="login-brand">Academia Europa</span>
      </div>
      <p class="login-sub">Admin panel — sign in to continue</p>
      <div class="msg error" id="login-err">Invalid email or password.</div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn-full" id="login-btn" onclick="doLogin()">Sign in</button>
      <p style="margin-top:1.5rem;font-size:0.775rem;color:var(--ink-3);text-align:center">
        <a href="index.html" style="color:inherit">← Back to public site</a>
      </p>
    </div>
  </div>

  <!-- APP -->
  <div id="admin-app">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-brand">Academia Europa</span>
        <span class="topbar-badge">Admin</span>
      </div>
      <div class="topbar-right">
        <a class="btn-sm" href="index.html" target="_blank">View site ↗</a>
        <button class="btn-sm primary" id="topbar-save" onclick="saveArticle()" disabled>Save</button>
        <button class="btn-sm" id="logout-btn" onclick="doLogout()">Sign out</button>
      </div>
    </div>

    <div class="app-layout">
      <div class="sidebar">
        <div class="sidebar-top">
          <input class="sidebar-search" type="search" placeholder="Search articles…" oninput="filterList(this.value)" />
          <button class="btn-new" onclick="newArticle()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
            New article
          </button>
        </div>
        <div class="sidebar-label">Articles</div>
        <div class="sidebar-list" id="sidebar-list">
          <div class="spinner"></div>
        </div>
        <div class="sidebar-count" id="sidebar-count"></div>
      </div>

      <div class="editor" id="editor">
        <div class="empty-editor" id="empty-editor">
          <div class="empty-icon">✦</div>
          <div>Select an article to edit<br>or create a new one.</div>
        </div>

        <div id="editor-form" style="display:none">
          <div class="editor-hdr">
            <h2 id="editor-heading">New article</h2>
            <p id="editor-subheading">Fill in the fields and click Save</p>
          </div>

          <div class="field">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="Article title"
              oninput="dirty(); countChars('f-title','cc-title',140)" />
            <div class="char-count" id="cc-title"></div>
          </div>

          <div class="form-row">
            <div class="field">
              <label>Author *</label>
              <input type="text" id="f-author" placeholder="Dr. Jane Smith" oninput="dirty()" />
            </div>
            <div class="field">
              <label>Date *</label>
              <input type="date" id="f-date" oninput="dirty()" />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label>Category</label>
              <select id="f-category" onchange="dirty()">
                <option>Research</option>
                <option>Policy</option>
                <option>Events</option>
                <option>Opinion</option>
                <option>News</option>
                <option>Working Paper</option>
              </select>
            </div>
            <div class="field">
              <label>Article ID</label>
              <input type="text" id="f-id" readonly style="background:var(--surface);color:var(--ink-3)" />
              <div class="field-hint">Auto-assigned by database</div>
            </div>
          </div>

          <div class="field">
            <label>Excerpt * <span style="font-size:0.72rem;font-weight:300">(shown on cards — 2–3
                sentences)</span></label>
            <textarea id="f-excerpt" rows="3" placeholder="A short summary of the article…"
              oninput="dirty(); countChars('f-excerpt','cc-excerpt',320)"></textarea>
            <div class="char-count" id="cc-excerpt"></div>
          </div>

          <div class="field">
            <label>Full body * <span style="font-size:0.72rem;font-weight:300">(separate paragraphs with a blank
                line)</span></label>
            <textarea id="f-body" rows="20" placeholder="Full article text…" oninput="dirty()"></textarea>
          </div>

          <div class="divider"></div>

          <div class="form-actions">
            <button class="btn-sm" onclick="cancelEdit()">Discard</button>
            <button class="btn-sm primary" onclick="saveArticle()">Save article</button>
          </div>

          <div class="danger-section">
            <div class="danger-label">Danger zone</div>
            <button class="btn-danger" onclick="deleteArticle()">Delete this article permanently</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://wgybryptswsehwunkewy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndneWJyeXB0c3dzZWh3dW5rZXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzA0ODMsImV4cCI6MjA5MjkwNjQ4M30.Gi90SW442kPtaEiGZkoVUSj-gkJO9FQ6UmxT3V28jFo';
    // ─────────────────────────────────────────────────────────────────────────────

    // FIX: renamed to 'sb' to avoid conflict with the Supabase library's own
    // global 'supabase' variable, which caused "Identifier already declared" error
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let articles = [];
    let filtered = [];
    let currentId = null;
    let isDirty = false;
    let currentUser = null;

    // ─── AUTH ─────────────────────────────────────────────────────────────────────
    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw = document.getElementById('login-pw').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-err');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) {
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      } else {
        currentUser = data.user;
        showApp();
      }
    }

    async function doLogout() {
      await sb.auth.signOut();
      location.reload();
    }

    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        currentUser = session.user;
        showApp();
      }
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
      loadAllArticles();
    }

    // ─── LOAD ─────────────────────────────────────────────────────────────────────
    async function loadAllArticles() {
      const { data, error } = await sb
        .from('articles')
        .select('id, title, author, date, category, excerpt, body')
        .order('date', { ascending: false });

      if (error) { toast('Error loading articles: ' + error.message, 'err'); return; }
      articles = data || [];
      filtered = articles;
      renderList(filtered);
    }

    function renderList(list) {
      const el = document.getElementById('sidebar-list');
      document.getElementById('sidebar-count').textContent =
        `${list.length} of ${articles.length} articles`;

      if (!list.length) {
        el.innerHTML = '<div style="text-align:center;padding:2rem;font-size:0.825rem;color:var(--ink-3)">No articles found.</div>';
        return;
      }

      el.innerHTML = list.map(a => {
        const d = new Date(a.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        return `<div class="ali ${a.id === currentId ? 'active' : ''}" onclick="selectArticle(${a.id})">
          <div class="ali-title">${esc(a.title)}</div>
          <div class="ali-meta">${esc(a.category || '')} · ${d}</div>
        </div>`;
      }).join('');
    }

    function filterList(q) {
      const lower = q.toLowerCase();
      filtered = articles.filter(a =>
        (a.title || '').toLowerCase().includes(lower) ||
        (a.author || '').toLowerCase().includes(lower) ||
        (a.category || '').toLowerCase().includes(lower)
      );
      renderList(filtered);
    }

    // ─── SELECT / EDIT ────────────────────────────────────────────────────────────
    function selectArticle(id) {
      if (isDirty && !confirm('You have unsaved changes. Discard them?')) return;
      const a = articles.find(x => x.id == id);
      if (!a) return;
      currentId = id;
      isDirty = false;

      document.getElementById('empty-editor').style.display = 'none';
      document.getElementById('editor-form').style.display = 'block';
      document.getElementById('editor-heading').textContent = 'Edit article';
      document.getElementById('editor-subheading').textContent = `ID: ${a.id}`;

      document.getElementById('f-title').value = a.title || '';
      document.getElementById('f-author').value = a.author || '';
      document.getElementById('f-date').value = a.date || '';
      document.getElementById('f-category').value = a.category || 'Research';
      document.getElementById('f-excerpt').value = a.excerpt || '';
      document.getElementById('f-body').value = a.body || '';
      document.getElementById('f-id').value = a.id;

      countChars('f-title', 'cc-title', 140);
      countChars('f-excerpt', 'cc-excerpt', 320);
      document.getElementById('topbar-save').disabled = true;
      renderList(filtered);
    }

    function newArticle() {
      if (isDirty && !confirm('Discard unsaved changes?')) return;
      currentId = null;
      isDirty = false;

      document.getElementById('empty-editor').style.display = 'none';
      document.getElementById('editor-form').style.display = 'block';
      document.getElementById('editor-heading').textContent = 'New article';
      document.getElementById('editor-subheading').textContent = 'Fill in the fields and click Save';

      ['f-title', 'f-author', 'f-excerpt', 'f-body'].forEach(id =>
        document.getElementById(id).value = '');
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('f-category').value = 'Research';
      document.getElementById('f-id').value = 'assigned on save';
      document.getElementById('topbar-save').disabled = true;
      renderList(filtered);
    }

    function cancelEdit() {
      if (isDirty && !confirm('Discard changes?')) return;
      isDirty = false;
      currentId = null;
      document.getElementById('editor-form').style.display = 'none';
      document.getElementById('empty-editor').style.display = 'flex';
      document.getElementById('topbar-save').disabled = true;
      renderList(filtered);
    }

    // ─── SAVE ─────────────────────────────────────────────────────────────────────
    async function saveArticle() {
      const title = document.getElementById('f-title').value.trim();
      const author = document.getElementById('f-author').value.trim();
      const date = document.getElementById('f-date').value;
      const category = document.getElementById('f-category').value;
      const excerpt = document.getElementById('f-excerpt').value.trim();
      const body = document.getElementById('f-body').value.trim();

      if (!title || !author || !date || !excerpt || !body) {
        toast('Please fill in all required fields (*)', 'err'); return;
      }

      const btn = document.getElementById('topbar-save');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      const payload = { title, author, date, category, excerpt, body };
      let error, data;

      if (currentId) {
        ({ error, data } = await sb
          .from('articles').update(payload).eq('id', currentId).select().single());
      } else {
        ({ error, data } = await sb
          .from('articles').insert(payload).select().single());
      }

      btn.textContent = 'Save';

      if (error) {
        toast('Save failed: ' + error.message, 'err');
        btn.disabled = false;
        return;
      }

      isDirty = false;
      btn.disabled = true;

      if (!currentId) {
        currentId = data.id;
        articles.unshift(data);
      } else {
        const idx = articles.findIndex(a => a.id == currentId);
        if (idx > -1) articles[idx] = data;
      }

      filtered = articles;
      document.getElementById('f-id').value = data.id;
      renderList(filtered);
      toast('Article saved!', 'ok');
    }

    // ─── DELETE ───────────────────────────────────────────────────────────────────
    async function deleteArticle() {
      if (!currentId) return;
      const a = articles.find(x => x.id == currentId);
      if (!confirm(`Permanently delete "${a?.title}"? This cannot be undone.`)) return;

      const { error } = await sb.from('articles').delete().eq('id', currentId);
      if (error) { toast('Delete failed: ' + error.message, 'err'); return; }

      articles = articles.filter(x => x.id != currentId);
      filtered = articles;
      currentId = null;
      isDirty = false;
      document.getElementById('editor-form').style.display = 'none';
      document.getElementById('empty-editor').style.display = 'flex';
      renderList(filtered);
      toast('Article deleted.', 'ok');
    }

    // ─── HELPERS ──────────────────────────────────────────────────────────────────
    function dirty() {
      isDirty = true;
      document.getElementById('topbar-save').disabled = false;
    }

    function countChars(inputId, countId, max) {
      const n = document.getElementById(inputId).value.length;
      const el = document.getElementById(countId);
      el.textContent = `${n} / ${max}`;
      el.style.color = n > max ? 'var(--danger)' : 'var(--ink-3)';
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function toast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    // ─── BOOT ─────────────────────────────────────────────────────────────────────
    checkSession();
  </script>
</body>

</html>
