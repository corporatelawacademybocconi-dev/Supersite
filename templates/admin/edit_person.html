{% extends "admin/base_admin.html" %}

{% block title %}Edit Person{% endblock %}

{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">
        <p class="page-hero-label">Reserved Area</p>
        <h1 class="page-hero-title">Edit Person</h1>
    </div>
</section>

<select name="division">
    <option value="">— None —</option>
    <option value="leadership" {% if person.division=="leadership" %}selected{% endif %}>Leadership</option>
    <option value="heads" {% if person.division=="heads" %}selected{% endif %}>Heads</option>
</select>

<section class="section">
    <div class="container">

        <form method="POST" class="reserved-login-form" enctype="multipart/form-data">

            <input type="text" name="name" value="{{ person.name }}" required>

            <input type="text" name="slug" value="{{ person.slug }}" required>

            <input type="text" name="role" value="{{ person.role or '' }}">

            <textarea name="bio" rows="6">{{ person.bio or '' }}</textarea>

            <input type="url" name="linkedin_url" value="{{ person.linkedin_url or '' }}">

            <label>
                <input type="checkbox" name="is_author" {% if person.is_author %}checked{% endif %}>
                Author
            </label>

            <label>
                <input type="checkbox" name="is_team_member" {% if person.is_team_member %}checked{% endif %}>
                Team Member
            </label>
            <label>Profile Picture URL</label>
            <input type="url" name="profile_image_url" value="{{ person.profile_image_url or '' }}"
                placeholder="https://...">
            <label>Upload Profile Picture</label>
            <input type="file" name="profile_image" accept="image/*">

            <button type="submit" class="btn btn-primary">
                Save Changes
            </button>

        </form>

    </div>
</section>

{% endblock %}
