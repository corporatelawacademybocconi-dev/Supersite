{% extends "admin/base_admin.html" %}
{% block title %}Edit Episode{% endblock %}
{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">
        <p class="page-hero-label">Reserved Area</p>
        <h1 class="page-hero-title">Edit Episode</h1>
    </div>
</section>

<section class="section">
    <div class="container">
        <form method="POST" class="reserved-login-form">
            <input type="text" name="title" value="{{ episode.title }}" required>
            <textarea name="description" rows="5">{{ episode.description or '' }}</textarea>
            <input type="date" name="date" value="{{ episode.date or '' }}">
            <input type="url" name="spotify_url" value="{{ episode.spotify_url or '' }}" placeholder="Spotify URL">
            <input type="url" name="cover_image_url" value="{{ episode.cover_image_url or '' }}"
                placeholder="Cover Image URL">
            <select name="status">
                <option value="draft" {% if episode.status=="draft" %}selected{% endif %}>Draft</option>
                <option value="published" {% if episode.status=="published" %}selected{% endif %}>Published</option>
            </select>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</section>

{% endblock %}
