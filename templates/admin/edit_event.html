{% extends "admin/base_admin.html" %}

{% block title %}Edit Event{% endblock %}

{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">
        <p class="page-hero-label">Reserved Area</p>
        <h1 class="page-hero-title">Edit Event</h1>
    </div>
</section>

<section class="section">
    <div class="container">

        <form method="POST" class="reserved-login-form">

            <input type="text" name="title" value="{{ event.title }}" required>

            <input type="text" name="slug" value="{{ event.slug }}" required>

            <textarea name="description" rows="5">{{ event.description or '' }}</textarea>

            <input type="text" name="flyer_image_url" value="{{ event.flyer_image_url or '' }}"
                placeholder="Flyer image URL">

            <input type="text" name="location" value="{{ event.location or '' }}" placeholder="Location">

            <input type="datetime-local" name="start_datetime" value="{{ event.start_datetime[:16] }}" required>

            <input type="datetime-local" name="end_datetime"
                value="{{ event.end_datetime[:16] if event.end_datetime }}">

            <input type="url" name="registration_url" value="{{ event.registration_url or '' }}"
                placeholder="Registration URL">

            <textarea name="event_report" rows="8" placeholder="Event report">{{ event.event_report or '' }}</textarea>

            <select name="status">
                <option value="published" {% if event.status=="published" %}selected{% endif %}>Published</option>
                <option value="draft" {% if event.status=="draft" %}selected{% endif %}>Draft</option>
            </select>

            <label>
                <input type="checkbox" name="is_featured" {% if event.is_featured %}checked{% endif %}>
                Featured Event
            </label>

            <button type="submit" class="btn btn-primary">
                Save Changes
            </button>

        </form>

    </div>
</section>

{% endblock %}
