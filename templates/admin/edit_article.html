{% extends "admin/base_admin.html" %}

{% block title %}Create Article{% endblock %}

{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">
        <p class="page-hero-label">Reserved Area</p>
        <h1 class="page-hero-title">Update Article</h1>
    </div>
</section>

<section class="section">
    <div class="container">

        <form method="POST" enctype="multipart/form-data" class="reserved-login-form">

            <input type="text" name="title" value="{{ article.title }}" required>

            <select name="author_id" required>

                {% for author in authors %}

                <option value="{{ author.id }}" {% if author.id==article.author_id %} selected {% endif %}>
                    {{ author.name }}
                </option>

                {% endfor %}

            </select>

            <input type="text" name="category" value="{{ article.category or '' }}">

            <textarea name="excerpt" rows="3">{{ article.excerpt or '' }}</textarea>

            <textarea name="content" rows="12">{{ article.content or '' }}</textarea>

            <select name="status">
                <option value="draft" {% if article.status=="draft" %}selected{% endif %}>
                    Draft
                </option>

                <option value="published" {% if article.status=="published" %}selected{% endif %}>
                    Published
                </option>
            </select>
            <label>Cover Image URL</label>
            <input type="url" name="cover_image_url" value="{{ article.cover_image_url or '' }}"
                placeholder="https://your-project.supabase.co/storage/v1/object/public/media/...">

            {% if article.cover_image_url %}
            <div style="margin-top:20px;">
                <img src="{{ article.cover_image_url }}" alt="{{ article.title }}"
                    style="max-width:300px;border-radius:10px;">
            </div>
            {% endif %}
            <label>
                <input type="checkbox" name="is_featured" {% if article.is_featured %}checked{% endif %}>
                Featured Article
            </label>
            <label>Upload Cover Image</label>

            <input type="file" name="cover_image" accept="image/*">

            <button type="submit" class="btn btn-primary">
                Create Article
            </button>

        </form>

    </div>
</section>

{% endblock %}
