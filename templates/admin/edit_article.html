{% extends "admin/base_admin.html" %}

{% block title %}Edit Article{% endblock %}

{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">
        <p class="page-hero-label">Reserved Area</p>
        <h1 class="page-hero-title">Update Article</h1>
    </div>
</section>

<section class="section">
    <div class="container">

        <form method="POST" enctype="multipart/form-data" class="reserved-login-form">

            <input type="text" name="title" value="{{ article.title }}" required>

            <select name="author_id" required>
                {% for author in authors %}
                <option value="{{ author.id }}" {% if author.id==article.author_id %}selected{% endif %}>
                    {{ author.name }}
                </option>
                {% endfor %}
            </select>

            <input type="text" name="category" value="{{ article.category or '' }}">

            <textarea name="excerpt" rows="3">{{ article.excerpt or '' }}</textarea>

            <!-- | safe here so TinyMCE receives the raw HTML, not escaped entities -->
            <textarea id="content-editor" name="content">{{ article.content | safe }}</textarea>

            <select name="status">
                <option value="draft" {% if article.status=="draft" %}selected{% endif %}>Draft</option>
                <option value="published" {% if article.status=="published" %}selected{% endif %}>Published</option>
            </select>

            <label>Cover Image URL</label>
            <input type="url" name="cover_image_url" value="{{ article.cover_image_url or '' }}"
                placeholder="https://your-project.supabase.co/storage/v1/object/public/media/...">

            {% if article.cover_image_url %}
            <div style="margin-top: 20px;">
                <img src="{{ article.cover_image_url }}" alt="{{ article.title }}"
                    style="max-width: 300px; border-radius: 10px;">
            </div>
            {% endif %}

            <label>Upload Cover Image</label>
            <input type="file" name="cover_image" accept="image/*">

            <label>
                <input type="checkbox" name="is_featured" {% if article.is_featured %}checked{% endif %}>
                Featured Article
            </label>

            <button type="submit" class="btn btn-primary">Save Article</button>

        </form>

        <!-- Delete form — separate from the save form -->
        <form method="POST" action="{{ url_for('admin_delete_article', article_id=article.id) }}"
            onsubmit="return confirm('Delete \'{{ article.title }}\'? This cannot be undone.')"
            style="margin-top: 16px;">
            <button type="submit" class="btn btn-danger">Delete Article</button>
        </form>

        </form>

    </div>
</section>

<!-- Replace YOUR_API_KEY with your key from tiny.cloud -->
<script src="https://cdn.tiny.cloud/1/28no8almk00il0r0u1zzfpt4ere74sj6ntgzg7efe78phbrk/tinymce/7/tinymce.min.js"
    referrerpolicy="origin"></script>

<script>
    tinymce.init({
        selector: '#content-editor',
        plugins: 'lists link',
        toolbar: 'bold italic underline | h2 h3 | bullist numlist | link blockquote | removeformat',
        menubar: false,
        branding: false,
        height: 500,
        content_style: 'body { font-family: Georgia, serif; font-size: 17px; line-height: 1.8; max-width: 720px; margin: 0 auto; }',
    });
</script>

{% endblock %}
