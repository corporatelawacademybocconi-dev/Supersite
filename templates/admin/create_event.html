{% extends "admin/base_admin.html" %}

{% block title %}Create Event{% endblock %}

{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">

        <p class="page-hero-label">Reserved Area</p>

        <h1 class="page-hero-title">
            Create Event
        </h1>

    </div>
</section>

<section class="section">
    <div class="container">

        <form method="POST" class="reserved-login-form">

            <input type="text" name="title" placeholder="Event Title" required>

            <input type="text" name="slug" placeholder="event-slug" required>

            <textarea name="description" placeholder="Description" rows="6"></textarea>

            <input type="text" name="location" placeholder="Location">

            <input type="datetime-local" name="start_datetime" required>

            <button type="submit" class="btn btn-primary">
                Create Event
            </button>

        </form>

    </div>
</section>

{% endblock %}
