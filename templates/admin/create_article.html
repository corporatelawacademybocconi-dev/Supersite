{% extends "admin/base_admin.html" %}

{% block title %}Create Article{% endblock %}

{% block admin_content %}

<section class="page-hero">
    <div class="page-hero-inner">
        <p class="page-hero-label">Reserved Area</p>
        <h1 class="page-hero-title">Create Article</h1>
    </div>
</section>

<section class="section">
    <div class="container">

        <form method="POST" enctype="multipart/form-data" class="reserved-login-form">

            <input type="text" name="title" placeholder="Title" required>

            <select name="author_id" required>
                {% for author in authors %}
                <option value="{{ author.id }}">{{ author.name }}</option>
                {% endfor %}
            </select>

            <input type="text" name="category" placeholder="Category">

            <textarea name="excerpt" rows="3" placeholder="Excerpt"></textarea>

            <!-- TinyMCE replaces this textarea -->
            <textarea id="content-editor" name="content" placeholder="Article Content"></textarea>

            <select name="status">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
            </select>

            <label>Cover Image URL</label>
            <input type="url" name="cover_image_url"
                placeholder="https://your-project.supabase.co/storage/v1/object/public/media/...">

            <label>Upload Cover Image</label>
            <input type="file" name="cover_image" accept="image/*">

            <label>
                <input type="checkbox" name="is_featured">
                Featured Article
            </label>

            <button type="submit" class="btn btn-primary">Create Article</button>

        </form>

    </div>
</section>

<!-- Replace YOUR_API_KEY with your key from tiny.cloud -->
<script src="https://cdn.tiny.cloud/1/28no8almk00il0r0u1zzfpt4ere74sj6ntgzg7efe78phbrk/tinymce/7/tinymce.min.js"
    referrerpolicy="origin"></script>

<script>
    tinymce.init({
        selector: '#content-editor',
        plugins: 'lists link',
        toolbar: 'bold italic underline | h2 h3 | bullist numlist | link blockquote | removeformat',
        menubar: false,
        branding: false,
        height: 500,
        content_style: 'body { font-family: Georgia, serif; font-size: 17px; line-height: 1.8; max-width: 720px; margin: 0 auto; }',
    });
</script>

{% endblock %}
