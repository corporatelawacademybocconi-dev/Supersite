<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Corporate Law Academy
        {% endblock %}
    </title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar">
        <div class="nav-inner">

            <a href="{{ url_for('search') }}" class="nav-search" aria-label="Search">

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>

            </a>

            <a href="{{ url_for('home') }}" class="nav-logo">
                <span class="logo-text">CLA</span>
            </a>

            <nav class="nav-links">

                <a href="{{ url_for('home') }}">
                    Home
                </a>

                <a href="{{ url_for('about') }}">
                    About
                </a>
                <a href="{{ url_for('people') }}">
                    People
                </a>

                <a href="{{ url_for('our_work') }}">
                    Our Work
                </a>
                <a href="{{ url_for('journal') }}">Journal</a>

                <a href="{{ url_for('networking') }}">
                    Networking
                </a>

                <a href="{{ url_for('contact') }}">
                    Contact
                </a>
                <a href="{{ url_for('reserved_area') }}" class="nav-reserved">
                    Reserved Area
                </a>

            </nav>

        </div>
    </header>

    <!-- PAGE CONTENT -->

    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-inner">

            <div>
                <h3>Corporate Law Academy</h3>
                <p>
                    Legal education, professional development,
                    and corporate practice.
                </p>
            </div>

            <div>
                © 2026 Corporate Law Academy
            </div>

        </div>

    </footer>

</body>

</html>
